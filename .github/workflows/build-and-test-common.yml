name: NeuG Build and Test (Common)

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'JSON-encoded array of runner labels (e.g. ["self-hosted","daily","linux","x64"])'
        type: string
        required: true
      container-json:
        description: 'JSON-encoded container spec, use {} for no container'
        type: string
        required: false
        default: '{}'
      os-type:
        description: 'Operating system type: linux or macos'
        type: string
        required: true
      enable-java-test:
        description: 'Whether to run Java driver tests'
        type: boolean
        required: false
        default: false
      enable-coverage:
        description: 'Whether to generate and upload coverage report'
        type: boolean
        required: false
        default: false
      enable-gopt-test:
        description: 'Whether to run gopt_test'
        type: boolean
        required: false
        default: true
      event-name:
        description: 'The original github.event_name from the caller'
        type: string
        required: true

jobs:
  build_and_test:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    container: ${{ inputs.container-json != '{}' && fromJSON(inputs.container-json) || null }}
    defaults:
      run:
        shell: bash
    steps:
    - name: checkout
      id: checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Detect changed paths
      id: changes
      uses: dorny/paths-filter@v3
      with:
        filters: |
          extension:
            - 'extension/**'
            - 'tests/extension/**'
            - 'tests/extensions/**'
          non_extension:
            - 'cmake/**'
            - 'src/**'
            - 'proto/**'
            - 'third_party/**'
            - 'tools/python_bind/**'
            - 'tools/java_driver/**'
            - 'tests/**'
            - '!tests/extension/**'
            - '!tests/extensions/**'
            - '.github/workflows/Linux.yml'
            - '.github/workflows/OSX.yml'
            - '.github/workflows/build-and-test-common.yml'
            - 'scripts/install_deps.sh'
            - 'include/**'
            - 'CMakeLists.txt'
            - 'doc/source/tutorials/**'

    - name: Decide test scope
      id: scope
      run: |
        if [[ "${{ steps.changes.outputs.extension }}" == "true" && "${{ steps.changes.outputs.non_extension }}" != "true" ]]; then
          echo "extension_only=true" >> "$GITHUB_OUTPUT"
          echo "Detected extension-only changes. Run extension tests only."
        else
          echo "extension_only=false" >> "$GITHUB_OUTPUT"
          echo "Detected non-extension changes. Run full test suite."
        fi

    - name: Increase the maximum number of opened files (Linux)
      if: inputs.os-type == 'linux'
      run: |
        ulimit -n 65535
        sudo chmod -R 777 /etc/security/*
        echo "*   soft  nofile  1048576" | tee -a /etc/security/limits.conf

    - name: Clean the tool directory for self-hosted runner (Linux)
      if: inputs.os-type == 'linux'
      run: |
        rm -rf /__w/_tool/Python

    - name: Install dependencies (Linux)
      if: inputs.os-type == 'linux'
      run: |
        sudo apt-get update && sudo apt-get install -y ccache

    - name: Install dependencies (macOS)
      if: inputs.os-type == 'macos'
      run: |
        brew install ccache
        bash scripts/install_deps.sh

    - name: Cache CCache
      uses: actions/cache@v4
      with:
        path: ${{ inputs.os-type == 'macos' && '~/Library/Caches/ccache' || '~/.cache/ccache' }}
        key: ${{ runner.os }}-${{ runner.arch }}-ccache-${{ github.ref_name }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'proto/**', '.github/workflows/Linux.yml', '.github/workflows/OSX.yml') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-ccache-${{ github.ref_name }}-
          ${{ runner.os }}-${{ runner.arch }}-ccache-main-
          ${{ runner.os }}-${{ runner.arch }}-ccache-

    - name: Setup CCache
      run: |
        if [[ "${{ inputs.os-type }}" == "macos" ]]; then
          mkdir -p ~/Library/Caches/ccache
          CCACHE_DIR=~/Library/Caches/ccache
        else
          mkdir -p ~/.cache/ccache
          CCACHE_DIR=~/.cache/ccache
        fi
        {
          echo "CCACHE_DIR=$CCACHE_DIR"
          echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"
          echo "CCACHE_COMPRESS=true"
          echo "CCACHE_COMPRESSLEVEL=6"
          echo "CCACHE_MAXSIZE=5G"
        } >> "$GITHUB_ENV"
        ccache --set-config=base_dir=${GITHUB_WORKSPACE}
        ccache --set-config=compiler_check=content
        ccache --set-config=compression=true
        ccache --max-size=5G
        ccache --zero-stats

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Setup Java and Maven
      if: inputs.enable-java-test
      uses: s4u/setup-maven-action@v1.19.0
      with:
        java-version: '17'
        maven-version: '3.9.6'

    - name: Set ENABLE_GCOV for main branch
      if: inputs.enable-coverage && steps.scope.outputs.extension_only != 'true' && (github.ref == 'refs/heads/main' && github.repository == 'alibaba/neug' && inputs.event-name == 'push')
      run: |
        python3 -m pip install fastcov
        sudo apt update
        sudo apt install lcov -y
        echo "ENABLE_GCOV=ON" >> $GITHUB_ENV

    - name: Build NeuG
      run: |
        NEUG_ENV_FOUND=false
        for env_file in /home/neug/.neug_env ~/.neug_env /github/home/.neug_env; do
          if [ -f "$env_file" ]; then
            source "$env_file"
            NEUG_ENV_FOUND=true
            break
          fi
        done
        if [ "$NEUG_ENV_FOUND" != "true" ]; then
          echo "Warning: .neug_env not found in any known location"
        fi
        cd ${GITHUB_WORKSPACE}/
        echo "CCache stats before build"
        ccache --show-stats
        if [[ "${{ inputs.os-type }}" == "linux" ]]; then
          export CI=ON
        fi
        export BUILD_TYPE=RELEASE
        if [[ "${{ inputs.os-type }}" == "macos" ]]; then
          export CMAKE_BUILD_PARALLEL_LEVEL=$(sysctl -n hw.ncpu)
        else
          export CMAKE_BUILD_PARALLEL_LEVEL=$(printf '%s\n' "$(nproc)" 32 | awk 'NR==1 || $0<min { min=$0 } END { print min }')
        fi
        if [[ "${{ steps.scope.outputs.extension_only }}" == "true" ]]; then
          export BUILD_EXECUTABLES=OFF
          export BUILD_HTTP_SERVER=OFF
          echo "Extension-only mode: disable executables and HTTP server build"
        else
          export BUILD_EXECUTABLES=ON
          export BUILD_HTTP_SERVER=ON
          echo "Full mode: build executables and HTTP server"
        fi
        export BUILD_TEST=ON
        export USE_NINJA=OFF
        export WITH_MIMALLOC=OFF
        export CMAKE_INSTALL_PREFIX=/opt/neug-install/
        sudo mkdir -p /opt/neug-install
        if [[ "${{ inputs.os-type }}" == "macos" ]]; then
          sudo chown -R $(id -u):$(id -g) /opt/neug-install/
          export CC="ccache clang"
          export CXX="ccache clang++"
        else
          sudo chown -R $USER:$USER /opt/neug-install/
          export CC="ccache gcc"
          export CXX="ccache g++"
        fi
        cd tools/python_bind
        make clean
        make requirements
        make build
        echo "CCache stats after build"
        ccache --show-stats

    - name: Test examples
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        ${GITHUB_WORKSPACE}/build/examples/cpp/simple_example

    - name: Install Python requirements
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pip install -r requirements.txt
        python3 -m pip install -r requirements_dev.txt
        python3 -m pip install pytest-cov coverage

    # ========================================
    # Phase 1: C++ Tests
    # ========================================
    - name: Run C++ Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        export MODERN_GRAPH_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/modern_graph
        export COMPREHENSIVE_GRAPH_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/comprehensive_graph
        export FLEX_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/modern_graph
        export TEST_PATH=${GITHUB_WORKSPACE}/tests
        cd ${GITHUB_WORKSPACE}/build
        ctest -R storage_test -V
        ctest -R transaction_test -V
        ctest -R csr_test -V
        ctest -R edge_table_test -V
        ctest -R graph_view_test -V
        ctest -R graph_snapshot_store_test -V
        ctest -R utils_test -V
        ctest -R execution_test -V
        export TEST_RESOURCE=${GITHUB_WORKSPACE}/tests/compiler
        ctest -R gopt_test -V
        ctest -R test_vertex_table -V
        ctest -R schema_test -V
        ctest -R test_mmap_container -V
        ctest -R logical_delete_test -V
        ctest -R test_connection -V
        ctest -R test_request -V
        ctest -R sink_test -V
        ctest -R test_indexer -V
        ctest -R test_db_svc -V
        ctest -R temporary_graph_test -V
        ctest -R copy_temp_test -V

    # ========================================
    # Phase 2: Bulk load test data
    # ========================================
    - name: Bulk Loader - Prepare test data
      if: steps.scope.outputs.extension_only != 'true'
      env:
        GS_TEST_DIR: ${{ github.workspace }}/gstest
      run: |
        git clone -b master --single-branch --depth=1 https://github.com/GraphScope/gstest.git ${GS_TEST_DIR}
        rm -rf /tmp/modern_graph && rm -rf /tmp/lsqb && rm -rf /tmp/ldbc && rm -rf /tmp/tinysnb && rm -rf /tmp/comprehensive_graph
        cd ${GITHUB_WORKSPACE}
        export FLEX_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/modern_graph
        GLOG_v=10 ./build/tools/utils/bulk_loader -g ./example_dataset/modern_graph/graph.yaml -l ./example_dataset/modern_graph/import.yaml -d /tmp/modern_graph
        export FLEX_DATA_DIR=${GS_TEST_DIR}/neug/lsqb-sf01
        GLOG_v=10 ./build/tools/utils/bulk_loader -g ${GS_TEST_DIR}/neug/lsqb-sf01/graph.yaml -l ${GS_TEST_DIR}/neug/lsqb-sf01/import.yaml -d /tmp/lsqb
        export FLEX_DATA_DIR=${GS_TEST_DIR}/flex/ldbc-sf01-long-date
        GLOG_v=10 ./build/tools/utils/bulk_loader -g ./example_dataset/ldbc/graph.yaml -l ./example_dataset/ldbc/import.yaml -d /tmp/ldbc/
        export FLEX_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/tinysnb
        GLOG_v=10 ./build/tools/utils/bulk_loader -g ./example_dataset/tinysnb/graph.yaml -l ./example_dataset/tinysnb/import.yaml -d /tmp/tinysnb
        export FLEX_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/comprehensive_graph
        GLOG_v=10 ./build/tools/utils/bulk_loader -g ./example_dataset/comprehensive_graph/graph.yaml -l ./example_dataset/comprehensive_graph/import.yaml -d /tmp/comprehensive_graph

    # ========================================
    # Phase 3: Python Tests
    # ========================================
    - name: Run Python Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        export FLEX_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/modern_graph
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_batch_loading.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_alter_property.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_ddl.py
        export NEUG_DB_DIR=/tmp/tinysnb
        export NEUG_QUERY='MATCH (n1:person)-[:knows]-(n2:person)-[:knows]-(n3:person), (n1)-[:knows]-(n3) RETURN n1.fName, n2.fName, n3.fName'
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_query.py
        export NEUG_DB_DIR=/tmp/modern_graph
        export NEUG_QUERY='MATCH (n1:person)-[:knows]-(n2:person)-[:knows]-(n3:person), (n1)-[:knows]-(n3) RETURN n1.name, n2.name, n3.name'
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_query.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_tp_service.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_load.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_export.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_copy_temp.py

    - name: Run lsqb test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        export LSQB_DATA_DIR=/tmp/lsqb
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_lsqb.py

    - name: Run DB Init Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_db_init.py

    - name: Run DB Connection Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_db_connection.py

    - name: Run Query Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_schema.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_dml.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_query.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_path.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_persistence.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_call_string_literal.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_dataset.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_merge.py

    - name: Run TinySNB Tutorial Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_tinysnb_tutorial.py

    - name: Run Transaction Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_db_transaction.py

    - name: Run Import/Export Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_db_import_export.py

    - name: Run Data I/O Documentation Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        export FLEX_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/modern_graph
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_data_io_docs.py

    - name: Run LOAD FROM sniffer tests (CSV and JSON)
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_sniffer.py -k "csv or json"

    - name: Run Complex Query Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_db_cases.py

    - name: Run List/Array Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_db_list.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_db_array.py

    - name: Run Concurrency Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_db_concurrent.py

    - name: Run Transaction Concurrent Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/transaction/elle_tester_insert.py

    - name: Run PyArrow related test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pip install pyarrow==18.0.0
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_to_arrow.py
        python3 -m pip uninstall -y pyarrow

    - name: Test CLI tool
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_ngcli_commands.py
        python3 -m pytest --cov=neug --cov-report=term --exitfirst --cov-append --cov-config=.coveragerc -sv tests/test_ngcli_basics.py

    - name: Run Java Driver Test
      if: inputs.enable-java-test && steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tools/java_driver/
        mvn test
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        python3 -m pytest -sv tests/test_java_driver.py

    # ========================================
    # Phase 4: E2E Tests
    # ========================================
    - name: Run E2E modern_graph Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tests/e2e
        ./scripts/run_e2e_test.sh neug_ap_test modern_graph /tmp/modern_graph basic_test,match,optional_match
        ./scripts/run_e2e_test.sh neug_tp_test modern_graph /tmp/modern_graph basic_test,match,optional_match

    - name: Run E2E tinysnb Test
      if: steps.scope.outputs.extension_only != 'true'
      env:
        GS_TEST_DIR: ${{ github.workspace }}/gstest
      run: |
        cd ${GITHUB_WORKSPACE}/tests/e2e
        export NEUG_ROOT_DIRECTORY=${GITHUB_WORKSPACE}
        ./scripts/run_e2e_test.sh neug_ap_test tinysnb /tmp/tinysnb !update true
        ./scripts/run_e2e_test.sh neug_tp_test tinysnb /tmp/tinysnb !update,!copy,!ddl true
        ./scripts/run_e2e_test.sh neug_ap_test tinysnb /tmp/tinysnb update true
        ./scripts/run_e2e_test.sh neug_tp_test tinysnb /tmp/tinysnb update true

    - name: Run E2E LSQB Test
      if: steps.scope.outputs.extension_only != 'true'
      env:
        GS_TEST_DIR: ${{ github.workspace }}/gstest
      run: |
        cd ${GITHUB_WORKSPACE}/tests/e2e
        ./scripts/run_e2e_test.sh neug_ap_test lsqb /tmp/lsqb lsqb
        ./scripts/run_e2e_test.sh neug_tp_test lsqb /tmp/lsqb lsqb

    - name: Run E2E LDBC Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tests/e2e
        ./scripts/run_e2e_test.sh neug_ap_test ldbc /tmp/ldbc agg,match,ldbc
        ./scripts/run_e2e_test.sh neug_tp_test ldbc /tmp/ldbc agg,match,ldbc

    - name: Run E2E COMPREHENSIVE_GRAPH Test
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/tests/e2e
        ./scripts/run_e2e_test.sh neug_ap_test comprehensive_graph /tmp/comprehensive_graph path,dynamic_param
        ./scripts/run_e2e_test.sh neug_tp_test comprehensive_graph /tmp/comprehensive_graph path

    - name: Test installation c++ sdk
      if: steps.scope.outputs.extension_only != 'true'
      run: |
        if [[ "${{ inputs.os-type }}" == "linux" ]]; then
          export CI=ON
        fi
        cd ${GITHUB_WORKSPACE}/build
        sudo cmake --install .
        if [[ "${{ inputs.os-type }}" == "macos" ]]; then
          otool -L /opt/neug-install/lib/libneug.dylib
        else
          ldd /opt/neug-install/lib/libneug.so
        fi
        printenv
        cd ${GITHUB_WORKSPACE}/tests/test_cpp_installation
        mkdir build && cd build
        if [[ "${{ inputs.os-type }}" == "macos" ]]; then
          export CMAKE_PREFIX_PATH=/opt/neug/:/opt/neug-install/:${GITHUB_WORKSPACE}/build/_deps/arrow-build/
        else
          export CMAKE_PREFIX_PATH=/opt/neug/:/opt/neug-install/
        fi
        cmake .. && make -j$(if [[ "${{ inputs.os-type }}" == "macos" ]]; then sysctl -n hw.ncpu; else echo 1; fi)
        ./test

    # ========================================
    # Phase 5: Coverage Report (if main branch)
    # ========================================
    - name: Generate Coverage Report
      if: inputs.enable-coverage && steps.scope.outputs.extension_only != 'true' && (github.ref == 'refs/heads/main' && github.repository == 'alibaba/neug' && inputs.event-name == 'push')
      run: |
        python3 -m pip install fastcov
        sudo apt update
        sudo apt install lcov -y
        cd ${GITHUB_WORKSPACE}/build
        make coverage

    - name: Upload coverage to Codecov
      if: inputs.enable-coverage && steps.scope.outputs.extension_only != 'true' && (github.ref == 'refs/heads/main' && github.repository == 'alibaba/neug' && inputs.event-name == 'push')
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ${{ github.workspace }}/build/coverage_filtered.info
