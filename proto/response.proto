syntax="proto3";
package neug;
option java_package = "com.alibaba.neug.driver";
option java_outer_classname = "Results";
option cc_generic_services = true;


message MetaDatas {
  repeated string name = 1;
};


message Int32Array {
  repeated int32 values = 1 [packed = true];
  bytes validity = 2;
}

message UInt32Array {
  repeated uint32 values = 1 [packed = true];
  bytes validity = 2;
}

message Int64Array {
  repeated int64 values = 1 [packed = true];
  bytes validity = 2;
}


message UInt64Array {
  repeated uint64 values = 1 [packed = true];
  bytes validity = 2;
}


message FloatArray {
  repeated float values = 1 [packed = true];
  bytes validity = 2;
}

message DoubleArray {
  repeated double values = 1 [packed = true];
  bytes validity = 2;
}

message StringArray {
  repeated string values = 1;
  bytes validity = 2;
}

message BoolArray {
  repeated bool values = 1 [packed = true];
  bytes validity = 2;
}

message ListArray {
  repeated uint32 offsets = 1 [packed = true];  
  Array elements = 2;                  
  bytes validity = 3;
}


message StructArray {
  repeated Array fields = 1;  
  bytes validity = 2;
}


message TimestampArray {
  repeated int64 values = 1 [packed = true];
  bytes validity = 2;
}

message DateArray {
  repeated int64 values = 1 [packed = true];
  bytes validity = 2;
}

message IntervalArray {
  repeated string values = 1;
  bytes validity = 2;
}

message VertexArray {
  repeated string values = 1;
  bytes validity = 2;
}

message EdgeArray {
  repeated string values = 1;
  bytes validity = 2;
}

message PathArray {
  repeated string values = 1;
  bytes validity = 2;
}


message Array {
  oneof typed_array {
    Int32Array int32_array = 1;
    UInt32Array uint32_array = 2;
    Int64Array int64_array = 3;
    UInt64Array uint64_array = 4;
    FloatArray float_array = 5;
    DoubleArray double_array = 6;
    StringArray string_array = 7;
    BoolArray bool_array = 8;

    TimestampArray timestamp_array = 10;
    DateArray date_array = 11;
    IntervalArray interval_array = 12;
   
    ListArray list_array = 15;
    StructArray struct_array = 16;

    VertexArray vertex_array = 20;
    EdgeArray edge_array = 21;
    PathArray path_array = 22;
  }
}

message QueryResponse {
  int32 row_count = 1;
  MetaDatas schema = 2;
  repeated Array arrays = 3;
};

